<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RAG Chat — Vector Browser</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Sora:wght@600;700&display=swap" rel="stylesheet" />
    <style>
      /* ── Reset & tokens ─────────────────────────── */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --bg:          #080d18;
        --surface:     #0e1525;
        --surface2:    #131c30;
        --border:      rgba(255,255,255,0.07);
        --border-lit:  rgba(99,179,255,0.35);
        --accent:      #4f9cf9;
        --accent2:     #9b72f6;
        --text:        #e4eaf7;
        --text-muted:  #6b7fa3;
        --user-bg:     rgba(79,156,249,0.14);
        --agent-bg:    rgba(255,255,255,0.04);
        --radius-sm:   12px;
        --radius-md:   18px;
        --radius-lg:   24px;
        --radius-pill: 999px;
        --font:        'Inter', sans-serif;
        --font-head:   'Sora', sans-serif;
        --shadow-card: 0 4px 32px rgba(0,0,0,0.45);
      }

      html { font-family: var(--font); font-size: 15px; color: var(--text); background: var(--bg); }
      body { min-height: 100vh; display: flex; flex-direction: column; }

      /* ── Scrollbar ──────────────────────────────── */
      ::-webkit-scrollbar { width: 5px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 99px; }

      /* ── Layout ─────────────────────────────────── */
      .shell {
        width: min(1240px, calc(100% - 32px));
        margin: 28px auto 40px;
        display: flex;
        flex-direction: column;
        gap: 0;
        border-radius: var(--radius-lg);
        overflow: hidden;
        border: 1px solid var(--border);
        box-shadow: var(--shadow-card);
        background: var(--surface);
      }

      /* ── Title bar ──────────────────────────────── */
      .titlebar {
        display: flex;
        align-items: center;
        gap: 18px;
        padding: 14px 20px;
        background: var(--surface2);
        border-bottom: 1px solid var(--border);
        user-select: none;
      }
      .dots { display: flex; gap: 8px; }
      .dot {
        width: 11px; height: 11px;
        border-radius: 50%;
      }
      .dot-r { background: #f87171; }
      .dot-y { background: #fbbf24; }
      .dot-g { background: #34d399; }

      .tabs { display: flex; gap: 6px; }
      .tab {
        padding: 6px 14px;
        border-radius: var(--radius-pill);
        font-size: 0.82rem;
        color: var(--text-muted);
        background: transparent;
        cursor: default;
        transition: background 0.15s;
      }
      .tab.active {
        background: rgba(79,156,249,0.15);
        color: var(--accent);
      }

      .url-bar {
        flex: 1;
        display: flex;
        align-items: center;
        gap: 8px;
        background: rgba(255,255,255,0.03);
        border: 1px solid var(--border);
        border-radius: var(--radius-pill);
        padding: 7px 14px;
        color: var(--text-muted);
        font-size: 0.82rem;
      }
      .url-bar svg { flex-shrink: 0; }
      .url-bar input {
        border: none; background: transparent;
        color: var(--text-muted); font-size: 0.82rem;
        outline: none; width: 100%;
      }

      /* ── Main workspace ─────────────────────────── */
      .workspace {
        display: grid;
        grid-template-columns: 300px 1fr;
        min-height: 600px;
      }

      /* ── Sidebar ─────────────────────────────────── */
      .sidebar {
        border-right: 1px solid var(--border);
        padding: 28px 22px;
        display: flex;
        flex-direction: column;
        gap: 24px;
        overflow-y: auto;
      }

      .brand { display: flex; flex-direction: column; gap: 6px; }
      .brand h1 {
        font-family: var(--font-head);
        font-size: 1.5rem;
        background: linear-gradient(130deg, var(--accent), var(--accent2));
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .brand p { color: var(--text-muted); font-size: 0.85rem; line-height: 1.55; }

      .divider { height: 1px; background: var(--border); }

      .section-label {
        font-size: 0.72rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--text-muted);
        margin-bottom: 10px;
      }

      .form-group { display: flex; flex-direction: column; gap: 14px; }

      .field { display: flex; flex-direction: column; gap: 6px; }
      .field label {
        font-size: 0.78rem;
        color: var(--text-muted);
        font-weight: 500;
      }
      .field input[type="text"] {
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        color: var(--text);
        padding: 10px 13px;
        font-size: 0.88rem;
        outline: none;
        transition: border-color 0.15s;
      }
      .field input[type="text"]:focus {
        border-color: var(--border-lit);
      }

      /* File drop zone */
      .drop-zone {
        position: relative;
        border: 1.5px dashed rgba(255,255,255,0.1);
        border-radius: var(--radius-md);
        padding: 22px 16px;
        text-align: center;
        cursor: pointer;
        transition: border-color 0.2s, background 0.2s;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        color: var(--text-muted);
        font-size: 0.84rem;
      }
      .drop-zone:hover, .drop-zone.has-file {
        border-color: var(--accent);
        background: rgba(79,156,249,0.05);
      }
      .drop-zone input[type="file"] {
        position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
      }
      .drop-zone .icon {
        font-size: 1.6rem;
        line-height: 1;
      }
      .drop-zone .file-name {
        color: var(--accent);
        font-size: 0.8rem;
        word-break: break-all;
      }

      /* Buttons */
      .btn {
        display: flex; align-items: center; justify-content: center; gap: 8px;
        border: none;
        border-radius: var(--radius-pill);
        padding: 11px 20px;
        font-size: 0.88rem;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 0.15s, transform 0.12s, box-shadow 0.15s;
      }
      .btn:active { transform: scale(0.97); }
      .btn-primary {
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        color: #fff;
        box-shadow: 0 6px 22px rgba(79,156,249,0.25);
      }
      .btn-primary:hover { opacity: 0.9; box-shadow: 0 8px 28px rgba(79,156,249,0.35); }
      .btn-ghost {
        background: rgba(255,255,255,0.06);
        color: var(--text-muted);
        border: 1px solid var(--border);
      }
      .btn-ghost:hover { background: rgba(255,255,255,0.1); color: var(--text); }
      .btn-send {
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        color: #fff;
        border-radius: var(--radius-md);
        padding: 0 20px;
        min-width: 72px;
        height: 46px;
        box-shadow: 0 4px 18px rgba(79,156,249,0.22);
      }
      .btn-send:hover { opacity: 0.9; }
      .btn:disabled { opacity: 0.45; cursor: not-allowed; pointer-events: none; }

      /* Status banner */
      .status-banner {
        border-radius: var(--radius-sm);
        padding: 11px 14px;
        font-size: 0.83rem;
        line-height: 1.5;
        background: rgba(79,156,249,0.07);
        border: 1px solid rgba(79,156,249,0.15);
        color: #a5c8ff;
      }
      .status-banner.error {
        background: rgba(248,113,113,0.08);
        border-color: rgba(248,113,113,0.2);
        color: #fca5a5;
      }
      .status-banner.success {
        background: rgba(52,211,153,0.07);
        border-color: rgba(52,211,153,0.18);
        color: #6ee7b7;
      }

      /* ── Chat panel ──────────────────────────────── */
      .chat-panel {
        display: flex;
        flex-direction: column;
        padding: 28px 26px;
        gap: 20px;
      }

      .chat-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .chat-header h2 {
        font-family: var(--font-head);
        font-size: 1.1rem;
        font-weight: 600;
      }
      .chat-header p { color: var(--text-muted); font-size: 0.82rem; margin-top: 3px; }

      /* Message history */
      .history {
        flex: 1;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 12px;
        padding: 18px;
        background: rgba(255,255,255,0.02);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        min-height: 380px;
      }

      .empty-state {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 10px;
        color: var(--text-muted);
        font-size: 0.88rem;
        text-align: center;
        padding: 40px 20px;
      }
      .empty-state .big-icon { font-size: 2.2rem; opacity: 0.5; }

      .msg {
        max-width: 82%;
        border-radius: var(--radius-md);
        padding: 13px 16px;
        font-size: 0.9rem;
        line-height: 1.65;
        animation: fadeUp 0.22s ease;
      }
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(6px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .msg.user {
        align-self: flex-end;
        background: var(--user-bg);
        border: 1px solid rgba(79,156,249,0.18);
        color: #ddeeff;
        border-bottom-right-radius: 4px;
      }
      .msg.agent {
        align-self: flex-start;
        background: var(--agent-bg);
        border: 1px solid var(--border);
        color: var(--text);
        border-bottom-left-radius: 4px;
      }
      .msg.system {
        align-self: center;
        background: rgba(52,211,153,0.07);
        border: 1px solid rgba(52,211,153,0.15);
        color: #6ee7b7;
        font-size: 0.8rem;
        padding: 8px 14px;
        border-radius: var(--radius-pill);
        max-width: 90%;
      }
      .msg-label {
        font-size: 0.72rem;
        font-weight: 600;
        letter-spacing: 0.05em;
        opacity: 0.55;
        margin-bottom: 5px;
        text-transform: uppercase;
      }

      /* Typing indicator */
      .typing { align-self: flex-start; display: flex; gap: 5px; padding: 14px 18px; }
      .typing span {
        width: 7px; height: 7px; border-radius: 50%;
        background: var(--text-muted);
        animation: bounce 1.1s infinite;
      }
      .typing span:nth-child(2) { animation-delay: 0.18s; }
      .typing span:nth-child(3) { animation-delay: 0.36s; }
      @keyframes bounce {
        0%, 80%, 100% { transform: translateY(0); opacity: 0.5; }
        40% { transform: translateY(-6px); opacity: 1; }
      }

      /* Input row */
      .input-row {
        display: flex;
        gap: 10px;
        align-items: flex-end;
      }
      .input-wrap {
        flex: 1;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        overflow: hidden;
        transition: border-color 0.15s;
        display: flex;
        align-items: center;
        padding: 0 4px;
      }
      .input-wrap:focus-within { border-color: var(--border-lit); }
      .input-wrap input {
        flex: 1;
        background: transparent;
        border: none;
        color: var(--text);
        font-size: 0.9rem;
        padding: 14px 12px;
        outline: none;
      }
      .input-wrap input::placeholder { color: var(--text-muted); }

      /* ── Responsive ──────────────────────────────── */
      @media (max-width: 900px) {
        .workspace { grid-template-columns: 1fr; }
        .sidebar { border-right: none; border-bottom: 1px solid var(--border); }
      }
    </style>

    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  </head>
  <body>
    <div id="root"></div>

    <script>
      const { useState, useEffect, useRef, createElement: h } = React;

      /* ── helpers ──────────────────────────────────── */
      const Lock = () => h('svg', { width: 12, height: 12, viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: 2 },
        h('rect', { x: 3, y: 11, width: 18, height: 11, rx: 2 }),
        h('path', { d: 'M7 11V7a5 5 0 0 1 10 0v4' })
      );

      const SendIcon = () => h('svg', { width: 16, height: 16, viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: 2.2 },
        h('line', { x1: 22, y1: 2, x2: 11, y2: 13 }),
        h('polygon', { points: '22 2 15 22 11 13 2 9 22 2' })
      );

      /* ── App ──────────────────────────────────────── */
      function App() {
        const [userId,     setUserId]     = useState('user1');
        const [collection, setCollection] = useState('video_transcripts');
        const [sessionId,  setSessionId]  = useState('');
        const [file,       setFile]       = useState(null);
        const [messages,   setMessages]   = useState([]);
        const [query,      setQuery]      = useState('');
        const [status,     setStatus]     = useState({ text: 'Upload a transcript to start.', type: 'info' });
        const [loading,    setLoading]    = useState(false);
        const [uploading,  setUploading]  = useState(false);
        const histRef = useRef(null);

        useEffect(() => {
          if (histRef.current) histRef.current.scrollTop = histRef.current.scrollHeight;
        }, [messages, loading]);

        const push = (speaker, text) => setMessages(p => [...p, { speaker, text }]);

        /* Upload */
        const handleUpload = async () => {
          if (!file) { setStatus({ text: 'Please select a .txt file first.', type: 'error' }); return; }
          setUploading(true);
          setStatus({ text: 'Uploading…', type: 'info' });
          const fd = new FormData();
          fd.append('file', file);
          fd.append('collection', collection);
          fd.append('user_id', userId);
          fd.append('session_id', sessionId || '');
          try {
            const res = await fetch('/upload', { method: 'POST', body: fd });
            const data = await res.json();
            if (!res.ok) throw new Error(data.detail || 'Upload failed');
            setSessionId(data.session_id);
            setStatus({ text: `✓ ${data.chunks_indexed} chunks indexed. Session: ${data.session_id.slice(0,8)}…`, type: 'success' });
            push('system', `Upload complete — ${data.chunks_indexed} chunks indexed.`);
          } catch (e) {
            setStatus({ text: e.message, type: 'error' });
          } finally {
            setUploading(false);
          }
        };

        /* Chat */
        const handleChat = async () => {
          const prompt = query.trim();
          if (!prompt || loading) return;
          push('user', prompt);
          setQuery('');
          setLoading(true);
          try {
            const res = await fetch('/chat', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ query: prompt, collection, user_id: userId, session_id: sessionId, limit: 3 }),
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.detail || 'Chat failed');
            push('agent', data.answer);
          } catch (e) {
            push('agent', e.message || 'Something went wrong. Is the backend running?');
          } finally {
            setLoading(false);
          }
        };

        /* Rendered messages */
        const msgNodes = messages.map((m, i) =>
          h('div', { key: i, className: `msg ${m.speaker}` },
            m.speaker !== 'system' && h('div', { className: 'msg-label' }, m.speaker === 'user' ? 'You' : 'Agent'),
            h('div', null, m.text)
          )
        );

        if (loading) msgNodes.push(
          h('div', { key: 'typing', className: 'msg agent typing' },
            h('span'), h('span'), h('span')
          )
        );

        return h('div', { className: 'shell' },

          /* ── title bar ── */
          h('div', { className: 'titlebar' },
            h('div', { className: 'dots' },
              h('span', { className: 'dot dot-r' }),
              h('span', { className: 'dot dot-y' }),
              h('span', { className: 'dot dot-g' })
            ),
            h('div', { className: 'tabs' },
              h('span', { className: 'tab active' }, 'RAG Chat'),
              h('span', { className: 'tab' }, 'Upload'),
              h('span', { className: 'tab' }, 'History')
            ),
            h('div', { className: 'url-bar' },
              h(Lock),
              h('input', { value: 'http://127.0.0.1:8000', readOnly: true })
            )
          ),

          /* ── workspace ── */
          h('div', { className: 'workspace' },

            /* sidebar */
            h('aside', { className: 'sidebar' },
              h('div', { className: 'brand' },
                h('h1', null, 'Vector Browser'),
                h('p', null, 'Upload a transcript, then ask questions and get AI-powered answers from your own data.')
              ),

              h('div', { className: 'divider' }),

              h('div', null,
                h('div', { className: 'section-label' }, 'Configuration'),
                h('div', { className: 'form-group' },
                  h('div', { className: 'field' },
                    h('label', null, 'User ID'),
                    h('input', { type: 'text', value: userId, onChange: e => setUserId(e.target.value) })
                  ),
                  h('div', { className: 'field' },
                    h('label', null, 'Collection'),
                    h('input', { type: 'text', value: collection, onChange: e => setCollection(e.target.value) })
                  ),
                  h('div', { className: 'field' },
                    h('label', null, 'Session ID'),
                    h('input', { type: 'text', value: sessionId, onChange: e => setSessionId(e.target.value), placeholder: 'Auto-generated on upload' })
                  )
                )
              ),

              h('div', { className: 'divider' }),

              h('div', null,
                h('div', { className: 'section-label' }, 'Upload Transcript'),
                h('div', { className: 'form-group' },
                  h('label', {
                    className: `drop-zone${file ? ' has-file' : ''}`,
                    onClick: e => e.stopPropagation()
                  },
                    h('input', {
                      type: 'file',
                      accept: '.txt',
                      onChange: e => setFile(e.target.files?.[0] ?? null)
                    }),
                    h('span', { className: 'icon' }, '📄'),
                    file
                      ? h('span', { className: 'file-name' }, file.name)
                      : h('span', null, 'Click to choose a .txt file')
                  ),
                  h('button', {
                    className: 'btn btn-primary',
                    onClick: handleUpload,
                    disabled: uploading
                  }, uploading ? 'Uploading…' : 'Upload & Index'),
                  h('div', { className: `status-banner ${status.type}` }, status.text)
                )
              )
            ),

            /* chat panel */
            h('section', { className: 'chat-panel' },
              h('div', { className: 'chat-header' },
                h('div', null,
                  h('h2', null, 'Chat Console'),
                  h('p', null, 'Ask anything about the uploaded transcript.')
                ),
                h('button', { className: 'btn btn-ghost', onClick: () => setMessages([]) }, 'Clear')
              ),

              h('div', { className: 'history', ref: histRef },
                messages.length === 0 && !loading
                  ? h('div', { className: 'empty-state' },
                      h('span', { className: 'big-icon' }, '💬'),
                      h('span', null, 'No messages yet.'),
                      h('span', { style: { color: 'var(--text-muted)', fontSize: '0.78rem' } }, 'Upload a transcript and start chatting.')
                    )
                  : msgNodes
              ),

              h('div', { className: 'input-row' },
                h('div', { className: 'input-wrap' },
                  h('input', {
                    value: query,
                    onChange: e => setQuery(e.target.value),
                    onKeyDown: e => { if (e.key === 'Enter') { e.preventDefault(); handleChat(); } },
                    placeholder: 'Ask about your data…',
                    disabled: loading
                  })
                ),
                h('button', {
                  className: 'btn btn-send',
                  onClick: handleChat,
                  disabled: loading || !query.trim()
                }, h(SendIcon))
              )
            )
          )
        );
      }

      ReactDOM.createRoot(document.getElementById('root')).render(h(App));
    </script>
  </body>
</html>
